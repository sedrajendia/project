<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>مشروعي الرئيسي</title>
</head>
<body>
    <h1>مرحبا بكم في مشروعي</h1>
    <p>صفحة HTML رئيسية بها عناصر للتفاعل</p>

    <!-- Section 1: تسجيل المستخدم -->
    <h2>تسجيل المستخدم</h2>
    <label>اسم المستخدم:</label>
    <input type="text" placeholder="أدخل اسمك"><br>

    <label>البريد الإلكتروني:</label>
    <input type="email" placeholder="أدخل بريدك"><br>

    <label>كلمة المرور:</label>
    <input type="password" placeholder="أدخل كلمة المرور"><br>

    <button>تسجيل</button>

    <!-- Section 2: استبيان -->
    <h2>استبيان رأي</h2>
    <label>العمر:</label>
    <input type="number" placeholder="أدخل عمرك"><br>

    <label>الجنس:</label>
    <select>
        <option value="">اختر...</option>
        <option value="male">ذكر</option>
        <option value="female">أنثى</option>
        <option value="other">آخر</option>
    </select><br>

    <label>ملاحظات:</label>
    <textarea rows="4" placeholder="اكتب ملاحظاتك هنا"></textarea><br>

    <button>إرسال الاستبيان</button>

    <!-- Section 3: التعليقات -->
    <h2>تعليقات المستخدمين</h2>
    <label>أضف تعليق:</label>
    <textarea rows="3" placeholder="اكتب تعليقك"></textarea><br>
    <button>نشر التعليق</button>

    <!-- Section 4: نموذج تواصل -->
    <h2>نموذج تواصل معنا</h2>
    <label>الاسم:</label>
    <input type="text" placeholder="أدخل اسمك"><br>

    <label>البريد الإلكتروني:</label>
    <input type="email" placeholder="أدخل بريدك"><br>

    <label>الرسالة:</label>
    <textarea rows="5" placeholder="اكتب رسالتك"></textarea><br>

    <button>إرسال الرسالة</button>
</body>
</html>
